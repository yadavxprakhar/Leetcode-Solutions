name: 📊 Update README Stats

on:
  push:
    branches: [main]
  schedule:
    # Runs every day at midnight IST (6:30 PM UTC)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Progress Stats
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install requests python-dotenv

      - name: 🔄 Run Stats Update Script
        env:
          LEETCODE_USERNAME: yadavxprakhar
        run: |
          python scripts/update_readme.py

      - name: 💾 Commit & Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore(stats): auto-update progress [skip ci]"
          git push
