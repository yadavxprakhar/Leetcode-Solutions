name: Update LeetCode Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Update README
        run: |
          node <<EOF
          const fs = require("fs");
          const path = require("path");

          function getProblems(dir) {
            let problems = [];
            const files = fs.readdirSync(dir);

            for (let file of files) {
              if (fs.statSync(file).isDirectory() && file !== ".git") {
                problems.push(file);
              }
            }
            return problems;
          }

          function generateTable(problems) {
            let table = "| Problem | Link |\\n|--------|------|\\n";
            problems.forEach(p => {
              table += `| ${p} | [View](./${p}) |\\n`;
            });
            return table;
          }

          function updateReadme(table) {
            let readme = fs.readFileSync("README.md", "utf-8");

            const newSection = `
<!-- START_TABLE -->
${table}
<!-- END_TABLE -->
`;

            readme = readme.replace(
              /<!-- START_TABLE -->[\\s\\S]*<!-- END_TABLE -->/,
              newSection
            );

            fs.writeFileSync("README.md", readme);
          }

          const problems = getProblems(".");
          const table = generateTable(problems);
          updateReadme(table);
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update problem table" || echo "No changes"
          git push
          
